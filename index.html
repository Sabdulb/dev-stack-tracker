<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Track services and subscriptions across all your dev projects. Open source, no backend, localStorage-only." />
    <meta property="og:title" content="Dev Stack Tracker" />
    <meta property="og:description" content="Track services and subscriptions across all your dev projects. Open source, no backend, localStorage-only." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Dev Stack Tracker" />
    <meta name="twitter:description" content="Track services and subscriptions across all your dev projects." />
    <title>Dev Stack Tracker</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          var dark =
            t === 'dark' ||
            ((!t || t === 'system') &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
